version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# NexMind + Nextcloud Unified Stack
#
# Services:
#   nexmind          — AI Brain (Express + SQLite + Claude API) on port 3000
#   mariadb          — MySQL-compatible DB for Nextcloud
#   nextcloud        — Self-hosted cloud storage (Nextcloud 28)
#   nextcloud_cron   — Background job runner for Nextcloud
#   nginx            — Reverse proxy (NexMind :80 | Nextcloud :8080)
#
# Access:
#   NexMind   → http://localhost
#   Nextcloud → http://localhost:8080
#
# First run:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up -d
#   3. Wait ~60s for Nextcloud to initialize
#   4. Run: bash scripts/setup-nextcloud.sh
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── NexMind AI Brain ───────────────────────────────────────────────────────
  nexmind:
    build: .
    container_name: nexmind
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=production
      # Nextcloud connection (used by WebDAV client for file downloads)
      - NEXTCLOUD_URL=http://nextcloud
      - NEXTCLOUD_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_PASS=${NEXTCLOUD_ADMIN_PASSWORD}
      # Shared secret to authenticate webhook calls from Nextcloud
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - nexmind_db:/app/db
      - nexmind_uploads:/app/uploads
    depends_on:
      - nextcloud
    restart: unless-stopped
    networks:
      - nexmind_net

  # ── MariaDB — Nextcloud database ───────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: nexmind_mariadb
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nexmind_net

  # ── Nextcloud — Self-hosted file cloud ─────────────────────────────────────
  nextcloud:
    image: nextcloud:28-apache
    container_name: nexmind_nextcloud
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      # Allow nginx and localhost as trusted origins
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost nextcloud nginx 127.0.0.1
      - OVERWRITEPROTOCOL=http
      - OVERWRITEHOST=localhost:8080
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    depends_on:
      - mariadb
    restart: unless-stopped
    networks:
      - nexmind_net

  # ── Nextcloud Cron — Required for background tasks ─────────────────────────
  nextcloud_cron:
    image: nextcloud:28-apache
    container_name: nexmind_nextcloud_cron
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_config:/var/www/html/config
    entrypoint: /cron.sh
    depends_on:
      - nextcloud
      - mariadb
    restart: unless-stopped
    networks:
      - nexmind_net

  # ── Nginx — Reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexmind_nginx
    ports:
      - "80:80"       # NexMind app
      - "8080:8080"   # Nextcloud
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nexmind
      - nextcloud
    restart: unless-stopped
    networks:
      - nexmind_net

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  nexmind_db:
  nexmind_uploads:
  mariadb_data:
  nextcloud_data:
  nextcloud_config:
  nextcloud_apps:

# ── Shared internal network ────────────────────────────────────────────────────
networks:
  nexmind_net:
    driver: bridge
