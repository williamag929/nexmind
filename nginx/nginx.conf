# ─────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — NexMind + Nextcloud
#
#   Port 80   → NexMind  (http://nexmind:3000)
#   Port 8080 → Nextcloud (http://nextcloud:80)
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── NexMind — Port 80 ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Increase body size for file uploads to NexMind
        client_max_body_size 50M;

        # Server-Sent Events (SSE) for Claude streaming chat
        location /api/chat {
            proxy_pass         http://nexmind:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # SSE requires no buffering and a long timeout
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Required headers for SSE to work across proxy
            proxy_set_header   Connection        '';
            chunked_transfer_encoding on;
        }

        # Webhook endpoint from Nextcloud (internal network call)
        location /api/webhook {
            proxy_pass         http://nexmind:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # All other NexMind routes
        location / {
            proxy_pass         http://nexmind:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    # ── Nextcloud — Port 8080 ─────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Nextcloud recommends at least 512M for large file uploads
        client_max_body_size 512M;
        client_body_timeout  300s;

        # Required headers for Nextcloud
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains;" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass         http://nextcloud:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_buffering    off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Required for Nextcloud WebDAV
            proxy_set_header   Depth             $http_depth;
        }

        # Nextcloud notify_push (if enabled)
        location /push/ {
            proxy_pass         http://nextcloud:7867/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
